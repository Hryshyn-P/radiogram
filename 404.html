<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Open Radiogram FM</title>
  <script>
    const appStoreURL = "https://apps.apple.com/app/id6772640690";
    const appStoreSchemeURL = "itms-apps://itunes.apple.com/app/id6772640690";

    window.location.replace(appStoreSchemeURL);
    window.setTimeout(() => {
      window.location.href = appStoreURL;
    }, 700);
  </script>
  <style>
    body {
      align-items: center;
      background: #0c0d0f;
      color: #f5f1ea;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    main {
      max-width: 420px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 12px;
    }

    p {
      color: #c8bdae;
      font-size: 16px;
      line-height: 1.45;
      margin: 0 0 24px;
    }

    a {
      background: #f08a24;
      border-radius: 12px;
      color: #111;
      display: inline-block;
      font-weight: 700;
      padding: 13px 18px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Open Radiogram FM</h1>
    <p>Install Radiogram FM to listen to shared radio stations and podcasts.</p>
    <a href="https://apps.apple.com/app/id6772640690">Open in App Store</a>
  </main>
</body>
</html>
